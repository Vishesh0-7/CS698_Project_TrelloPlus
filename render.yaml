services:
  - type: web
    name: flowboard-backend
    env: java
    plan: free
    rootDir: backend
    buildCommand: mvn -DskipTests package
    startCommand: java -jar target/flowboard-backend-1.0.0.jar
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_LOG_LEVEL
        value: INFO
      - key: SECURITY_LOG_LEVEL
        value: WARN
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5:7b
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "30"