spring:
  application:
    name: flowboard-backend
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    open-in-view: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flowboard}
    username: ${DB_USERNAME:flowboard}
    password: ${DB_PASSWORD:flowboard_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:3}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.flowboard: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api/v1

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

jwt:
  secret: ${JWT_SECRET:change-this-in-production-with-min-32-characters}
  expiration: 86400000  # 24 hours in milliseconds

ai:
  bedrock:
    region: ${BEDROCK_REGION:us-east-2}
    model-id: ${BEDROCK_MODEL_ID:amazon.nova-micro-v1:0}
    timeout-seconds: ${BEDROCK_TIMEOUT_SECONDS:30}
    max-tokens: ${BEDROCK_MAX_TOKENS:2048}
