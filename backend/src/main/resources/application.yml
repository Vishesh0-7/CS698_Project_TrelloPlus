spring:
  application:
    name: flowboard-backend
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    open-in-view: false
  datasource:
    url: jdbc:postgresql://localhost:5432/flowboard
    username: flowboard
    password: flowboard_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.flowboard: DEBUG
    org.springframework.security: DEBUG

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api/v1

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

jwt:
  secret: "your-super-secret-key-change-this-in-production-at-least-32-characters-long"
  expiration: 86400000  # 24 hours in milliseconds

ai:
  mock-enabled: true
  openai:
    api-key: mock-key
    model: gpt-4-1106-preview
