name: Run Integration Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Fullstack Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowboard
          POSTGRES_USER: flowboard
          POSTGRES_PASSWORD: flowboard_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowboard -d flowboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_AMPLIFY_APP_ID: ${{ vars.AWS_AMPLIFY_APP_ID }}
      AWS_AMPLIFY_BRANCH: ${{ vars.AWS_AMPLIFY_BRANCH }}
      AWS_API_GATEWAY_REST_API_ID: ${{ vars.AWS_API_GATEWAY_REST_API_ID }}
      AWS_API_GATEWAY_STAGE: ${{ vars.AWS_API_GATEWAY_STAGE }}
      AWS_LAMBDA_ARTIFACTS_BUCKET: ${{ vars.AWS_LAMBDA_ARTIFACTS_BUCKET }}
      AWS_LAMBDA_FUNCTION_NAME: ${{ vars.AWS_LAMBDA_FUNCTION_NAME }}
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:*,http://localhost:*"

      FRONTEND_BASE: "http://127.0.0.1:5173"
      BACKEND_BASE: "http://127.0.0.1:8080/api/v1"
      RUN_AI_CASES: "true"
      RUN_DEPLOYMENT_ONLY_CASES: "false"

      INTEGRATION_RUN_AI_CASES: "true"
      INTEGRATION_DEPLOYMENT_ONLY_CASES: "false"
      INTEGRATION_FRONTEND_BASE: "http://127.0.0.1:5173"
      INTEGRATION_BACKEND_BASE: "http://127.0.0.1:8080/api/v1"

      VITE_API_BASE_URL: "http://127.0.0.1:8080/api/v1"
      VITE_WS_ENDPOINT: "http://127.0.0.1:8080/api/v1/ws/board"
      VITE_REQUEST_TIMEOUT_MS: "30000"
      VITE_LLM_REQUEST_TIMEOUT_MS: "90000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd backend
          mvn -B -ntp spring-boot:run \
            -Dspring-boot.run.arguments='--server.port=8080 --spring.profiles.active=dev' \
            > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/v1/auth/login || true)
            if [ "$code" != "000" ]; then
              echo "Backend is up with status $code"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1

      - name: Start frontend
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5173/login || true)
            if [ "$code" = "200" ]; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Run integration tests
        run: npm run test:integration:fullstack

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            backend.log
            frontend.log

      - name: Stop services
        if: always()
        run: |
          if [ -f backend.pid ]; then kill $(cat backend.pid) || true; fi
          if [ -f frontend.pid ]; then kill $(cat frontend.pid) || true; fi
