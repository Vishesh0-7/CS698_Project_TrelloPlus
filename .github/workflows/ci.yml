name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowboard
          POSTGRES_USER: flowboard
          POSTGRES_PASSWORD: flowboard_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowboard -d flowboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/flowboard
      SPRING_DATASOURCE_USERNAME: flowboard
      SPRING_DATASOURCE_PASSWORD: flowboard_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        run: mvn -B -ntp clean verify
