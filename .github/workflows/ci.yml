name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - deployment
    paths-ignore:
      - '**/*.md'
      - docs/**
      - Screenshots/**
      - coverage/**
  pull_request:
    paths-ignore:
      - '**/*.md'
      - docs/**
      - Screenshots/**
      - coverage/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontend-tests:
    name: Frontend Tests
    uses: ./.github/workflows/run-frontend-tests.yml
    secrets: inherit

  backend-tests:
    name: Backend Tests
    needs: frontend-tests
    uses: ./.github/workflows/run-backend-tests.yml
    secrets: inherit

  integration-tests:
    name: Integration Tests
    needs: backend-tests
    uses: ./.github/workflows/run-integration-tests.yml
    secrets: inherit

  deploy-backend:
    name: Deploy Backend Lambda
    needs: integration-tests
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/deploy-aws-lambda.yml
    secrets: inherit

  deploy-frontend:
    name: Deploy Frontend Amplify
    needs: deploy-backend
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/deploy-aws-amplify.yml
    secrets: inherit

